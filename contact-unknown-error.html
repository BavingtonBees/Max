<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You</title>

  <!-- Minimal, CSP‑safe styling -->
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
                   sans-serif;
      margin: 0;
      padding: 2rem;
      background: #fafafa;
      color: #222;
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }

    p {
      margin-bottom: 1.5rem;
    }

    a.button {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 500;
    }

    a.button:hover {
      background: #000;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Warning!</h1>
    <p>Due to an nknown problem your message may not have been sent. Please tray again later.</p>
    <a href="/" class="button">Return to Home</a>
  </div>
</body>
</html>
